<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ONLYOU · Night Desk (Print)</title>
<link rel="stylesheet" href="night-styles.css"/>
<style>
  html, body { background: #0B0C0F; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  .night-shell {
    background:
      radial-gradient(1200px 500px at 80% -10%, rgba(190,245,120,0.05), transparent 60%),
      radial-gradient(900px 400px at 0% 90%, rgba(100,180,220,0.04), transparent 60%),
      var(--bg);
  }

  .night-main {
    width: 1360px;
    margin: 0 auto;
    padding: 24px 24px 32px;
    display: flex; flex-direction: column; gap: 20px;
  }

  .hero-row {
    display: grid;
    grid-template-columns: minmax(0, 1.55fr) minmax(0, 1fr);
    gap: 22px;
    align-items: start;
  }

  .bottom-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 2fr);
    gap: 22px;
    align-items: start;
  }

  /* Kill animations & hover effects in print */
  *, *::before, *::after {
    animation: none !important;
    transition: none !important;
  }

  @page {
    size: 1440px 1100px;
    margin: 0;
  }

  @media print {
    html, body { background: #0B0C0F !important; }
    .night-shell { min-height: auto; }
    .night-main { padding: 20px 24px; }
    .hero-row, .bottom-row { break-inside: avoid; page-break-inside: avoid; }
    .panel, .panel-2 { break-inside: avoid; page-break-inside: avoid; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="night-top.jsx"></script>
<script type="text/babel" src="night-hero.jsx"></script>
<script type="text/babel" src="night-panels.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <div className="night-shell">
      <NightHeader/>
      <main className="night-main">
        <div className="hero-row">
          <HeroCard/>
          <RecentOrders/>
        </div>
        <div className="bottom-row">
          <WorkforcePanel/>
          <CTAPanel/>
          <ShiftPerfPanel/>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// Auto-print once fonts + layout settle
(async () => {
  try { await document.fonts.ready; } catch (e) {}
  await new Promise(r => setTimeout(r, 700));
  window.print();
})();
</script>
</body>
</html>
