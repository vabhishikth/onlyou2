<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ONLYOU · Operator Desk (Print)</title>
<link rel="stylesheet" href="admin-styles.css"/>
<style>
  html, body { background: var(--page); -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  .app { display: flex; min-height: auto; background: var(--page); }
  .main-col { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .workspace { padding: 22px 24px 32px; display: flex; flex-direction: column; gap: 18px; }

  .two-col { display: grid; grid-template-columns: minmax(0, 1.65fr) minmax(0, 1fr); gap: 18px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }

  .right-rail {
    width: 340px; flex-shrink: 0;
    border-left: 1px solid var(--line); background: var(--shell);
    padding: 22px 20px 32px; display: flex; flex-direction: column; gap: 18px;
  }

  /* Inline rail copy off for print — right rail is visible */
  .rail-inline { display: none; }

  /* Kill animations & transitions */
  *, *::before, *::after {
    animation: none !important;
    transition: none !important;
  }

  @page {
    size: 1680px 1180px;
    margin: 0;
  }

  @media print {
    html, body { background: var(--page) !important; }
    .app { min-height: auto; }
    .right-rail { max-height: none !important; position: static !important; overflow: visible !important; }
    .workspace { padding: 20px 22px; }
    .panel, .card, .two-col > *, .three-col > *, .rail-inline > * {
      break-inside: avoid; page-break-inside: avoid;
    }
    .two-col, .three-col { break-inside: avoid; page-break-inside: avoid; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="admin-data.jsx"></script>
<script type="text/babel" src="admin-viz.jsx"></script>
<script type="text/babel" src="admin-sidebar.jsx"></script>
<script type="text/babel" src="admin-top.jsx"></script>
<script type="text/babel" src="admin-panels.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <div className="app">
      <div style={{ display: 'flex' }}>
        <Sidebar collapsed={false} onToggle={() => {}}/>
      </div>

      <div className="main-col">
        <Header onMenu={() => {}}/>

        <div className="workspace">
          <KPIStrip/>

          <div className="two-col">
            <PipelineCard title="Lab Orders"   flavor="Consultation → Results"   stages={LAB_PIPELINE}      accent="var(--amber)"/>
            <PipelineCard title="Deliveries"   flavor="Prescription → OTP"       stages={DELIVERY_PIPELINE} accent="var(--honey)"/>
          </div>

          <QueueTable/>

          <div className="two-col">
            <RevenueCard/>
            <CoverageCard/>
          </div>
        </div>
      </div>

      <aside className="right-rail">
        <WorkforceCard/>
        <FeedCard/>
      </aside>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

(async () => {
  try { await document.fonts.ready; } catch (e) {}
  await new Promise(r => setTimeout(r, 700));
  window.print();
})();
</script>
</body>
</html>
